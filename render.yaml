# ==============================================================================
# Render Blueprint — IFAL Projetos
# https://docs.render.com/blueprint-spec
# ==============================================================================
# Para deploy automático: conecte o repositório ao Render e aponte para este
# arquivo em Dashboard > Blueprints > New Blueprint Instance.
# ==============================================================================

databases:
  - name: ifal-projetos-db
    plan: free
    databaseName: ifal_projetos
    user: ifal_user
    region: oregon

services:
  # --------------------------------------------------------------------------
  # Backend — FastAPI (Web Service com Docker)
  # --------------------------------------------------------------------------
  - type: web
    name: ifal-projetos-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./docker/backend.Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ifal-projetos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SUAP_CLIENT_ID
        sync: false  # Configurar manualmente no Dashboard
      - key: SUAP_CLIENT_SECRET
        sync: false
      - key: SUAP_REDIRECT_URI
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Configurar com a URL do frontend após o deploy
      - key: FRONTEND_URL
        sync: false  # Configurar com a URL do frontend (ex: https://ifal-projetos-frontend.onrender.com)
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: "30"

  # --------------------------------------------------------------------------
  # Frontend — Vue.js 3 (Static Site)
  # --------------------------------------------------------------------------
  - type: web
    name: ifal-projetos-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false  # Configurar com a URL do backend (ex: https://ifal-projetos-backend.onrender.com)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
