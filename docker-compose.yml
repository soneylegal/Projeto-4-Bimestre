version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ifal-projetos-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "25432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ifal-network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: ifal-projetos-backend
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUAP_CLIENT_ID=${SUAP_CLIENT_ID}
      - SUAP_CLIENT_SECRET=${SUAP_CLIENT_SECRET}
      - SUAP_REDIRECT_URI=${SUAP_REDIRECT_URI}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - ifal-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: ifal-projetos-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ifal-network

volumes:
  pgdata:

networks:
  ifal-network:
